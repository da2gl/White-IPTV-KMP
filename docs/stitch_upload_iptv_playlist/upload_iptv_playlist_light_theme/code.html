<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IPTV App Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2badee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col items-center group/design-root overflow-x-hidden antialiased">
<div class="flex h-full w-full max-w-md flex-col items-center justify-center p-6 pt-12 sm:pt-16">
<!-- App Logo/Name -->
<div class="flex items-center gap-3 pb-8">
<div class="flex h-12 w-12 items-center justify-center rounded-xl bg-primary text-white">
<span class="material-symbols-outlined text-3xl" data-icon="live_tv">live_tv</span>
</div>
<h1 class="text-slate-900 dark:text-slate-50 text-[32px] font-bold leading-tight tracking-[-0.02em]">YourTV</h1>
</div>
<!-- Header & Subheader -->
<div class="w-full text-center">
<h2 class="text-slate-900 dark:text-slate-50 text-[22px] font-bold leading-tight tracking-[-0.015em] pb-2 pt-5">Upload your IPTV playlist</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-3">Enter a link or choose a file to start watching</p>
</div>
<div class="h-8"></div>
<!-- Input Form -->
<div class="flex w-full flex-col items-center gap-4">
<!-- Text Input Field -->
<div class="flex w-full flex-col">
<label class="flex flex-col w-full">
<p class="text-slate-800 dark:text-slate-200 text-base font-medium leading-normal pb-2">Playlist URL (M3U, M3U8)</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-50 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 focus:border-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="https://..." value=""/>
</label>
</div>
<!-- Or Divider -->
<div class="flex w-full items-center gap-3 py-1">
<hr class="flex-grow border-t border-slate-200 dark:border-slate-700"/>
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">OR</span>
<hr class="flex-grow border-t border-slate-200 dark:border-slate-700"/>
</div>
<!-- Secondary Button: Choose File -->
<div class="flex w-full">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 flex-1 bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-base font-bold leading-normal tracking-[0.015em] transition-colors hover:bg-slate-200 dark:hover:bg-slate-700">
<span class="truncate">Choose file</span>
</button>
</div>
</div>
<div class="h-8"></div>
<!-- Primary CTA Button -->
<div class="flex w-full">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 flex-1 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] transition-transform active:scale-[0.98]">
<span class="truncate">Import playlist</span>
</button>
</div>
<!-- Feedback Area (Example: Error message) -->
<div class="w-full pt-4 text-center">
<!-- Example Error Message (hidden by default) -->
<!-- <p class="text-red-500 text-sm">Invalid URL. Please check and try again.</p> -->
<!-- Example Loading State (hidden by default) -->
<!--
                <div class="flex items-center justify-center gap-2 text-slate-500 dark:text-slate-400">
                    <svg class="animate-spin h-5 w-5 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Importing playlist...</span>
                </div>
                -->
</div>
<div class="flex-grow"></div>
<!-- Tertiary Link -->
<div class="flex w-full items-center justify-center pb-4 pt-8">
<a class="text-primary text-sm font-medium hover:underline" href="#">Use demo playlist</a>
</div>
</div>
</div>
</body></html>
