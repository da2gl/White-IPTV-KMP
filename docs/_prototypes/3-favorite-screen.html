<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none;}
        body { font-family: 'Inter', sans-serif; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0891b2',
                        dark: '#0f172a',
                        darker: '#020617',
                        accent: '#06b6d4'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darker text-white">
    
    <!-- Header -->
    <header id="header" class="bg-dark border-b border-slate-800 px-4 py-4">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-semibold flex items-center">
                <span class="mr-2">⭐</span>
                Favorites
            </h1>
            <button id="search-btn" class="p-2 hover:bg-slate-800 rounded-lg transition-colors">
                <i class="fa-solid fa-search text-slate-400"></i>
            </button>
        </div>
        
        <!-- Filter Dropdown -->
        <div class="mt-3 relative">
            <button id="playlist-dropdown" class="flex items-center justify-between w-full bg-slate-800 px-4 py-3 rounded-xl text-left hover:bg-slate-700 transition-colors">
                <span class="text-slate-300">Playlist: <span id="selected-playlist" class="text-white">All</span></span>
                <i class="fa-solid fa-chevron-down text-slate-400 text-sm"></i>
            </button>
            
            <!-- Dropdown Menu -->
            <div id="dropdown-menu" class="absolute top-full left-0 right-0 mt-2 bg-slate-800 rounded-xl border border-slate-700 shadow-xl z-50 hidden">
                <div class="py-2">
                    <button class="dropdown-item w-full px-4 py-3 text-left hover:bg-slate-700 transition-colors" data-value="all">
                        All playlists
                    </button>
                    <button class="dropdown-item w-full px-4 py-3 text-left hover:bg-slate-700 transition-colors" data-value="main">
                        Main
                    </button>
                    <button class="dropdown-item w-full px-4 py-3 text-left hover:bg-slate-700 transition-colors" data-value="kids">
                        Kids
                    </button>
                    <button class="dropdown-item w-full px-4 py-3 text-left hover:bg-slate-700 transition-colors" data-value="sports">
                        Sports
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="px-4 py-6">
        
        <!-- Favorites Grid -->
        <div id="favorites-grid" class="space-y-3">
            
            <!-- Channel Card 1 -->
            <div class="channel-card bg-slate-800 rounded-xl p-4 flex items-center hover:bg-slate-700 transition-colors cursor-pointer">
                <div class="w-12 h-12 bg-gradient-to-br from-red-500 to-red-600 rounded-lg flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa-solid fa-tv text-white text-lg"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-medium text-white truncate">CNN International</h3>
                    <p class="text-sm text-slate-400 mt-1">Main</p>
                </div>
                <button class="remove-favorite p-2 hover:bg-slate-600 rounded-lg transition-colors ml-2">
                    <i class="fa-solid fa-star text-accent"></i>
                </button>
            </div>

            <!-- Channel Card 2 -->
            <div class="channel-card bg-slate-800 rounded-xl p-4 flex items-center hover:bg-slate-700 transition-colors cursor-pointer">
                <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa-solid fa-play text-white text-lg"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-medium text-white truncate">ESPN Sports Center</h3>
                    <p class="text-sm text-slate-400 mt-1">Sports</p>
                </div>
                <button class="remove-favorite p-2 hover:bg-slate-600 rounded-lg transition-colors ml-2">
                    <i class="fa-solid fa-star text-accent"></i>
                </button>
            </div>

            <!-- Channel Card 3 -->
            <div class="channel-card bg-slate-800 rounded-xl p-4 flex items-center hover:bg-slate-700 transition-colors cursor-pointer">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-purple-600 rounded-lg flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa-solid fa-film text-white text-lg"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-medium text-white truncate">Disney Channel</h3>
                    <p class="text-sm text-slate-400 mt-1">Kids</p>
                </div>
                <button class="remove-favorite p-2 hover:bg-slate-600 rounded-lg transition-colors ml-2">
                    <i class="fa-solid fa-star text-accent"></i>
                </button>
            </div>

            <!-- Channel Card 4 -->
            <div class="channel-card bg-slate-800 rounded-xl p-4 flex items-center hover:bg-slate-700 transition-colors cursor-pointer">
                <div class="w-12 h-12 bg-gradient-to-br from-green-500 to-green-600 rounded-lg flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa-solid fa-leaf text-white text-lg"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-medium text-white truncate">National Geographic</h3>
                    <p class="text-sm text-slate-400 mt-1">Main</p>
                </div>
                <button class="remove-favorite p-2 hover:bg-slate-600 rounded-lg transition-colors ml-2">
                    <i class="fa-solid fa-star text-accent"></i>
                </button>
            </div>

            <!-- Channel Card 5 -->
            <div class="channel-card bg-slate-800 rounded-xl p-4 flex items-center hover:bg-slate-700 transition-colors cursor-pointer">
                <div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa-solid fa-futbol text-white text-lg"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-medium text-white truncate">Fox Sports 1</h3>
                    <p class="text-sm text-slate-400 mt-1">Sports</p>
                </div>
                <button class="remove-favorite p-2 hover:bg-slate-600 rounded-lg transition-colors ml-2">
                    <i class="fa-solid fa-star text-accent"></i>
                </button>
            </div>

            <!-- Channel Card 6 -->
            <div class="channel-card bg-slate-800 rounded-xl p-4 flex items-center hover:bg-slate-700 transition-colors cursor-pointer">
                <div class="w-12 h-12 bg-gradient-to-br from-pink-500 to-pink-600 rounded-lg flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa-solid fa-heart text-white text-lg"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-medium text-white truncate">Cartoon Network</h3>
                    <p class="text-sm text-slate-400 mt-1">Kids</p>
                </div>
                <button class="remove-favorite p-2 hover:bg-slate-600 rounded-lg transition-colors ml-2">
                    <i class="fa-solid fa-star text-accent"></i>
                </button>
            </div>

        </div>

        <!-- Empty State (Hidden by default) -->
        <div id="empty-state" class="text-center py-16 hidden">
            <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-star text-slate-600 text-2xl"></i>
            </div>
            <h3 class="text-xl font-medium text-white mb-2">No favorites yet</h3>
            <p class="text-slate-400 mb-4 px-8">You haven't added any favorite channels yet</p>
            <p class="text-sm text-slate-500 px-8">Add channels to Favorites by tapping the ⭐ icon.</p>
        </div>

    </main>

    <script>
        // Dropdown functionality
        const dropdownBtn = document.getElementById('playlist-dropdown');
        const dropdownMenu = document.getElementById('dropdown-menu');
        const selectedPlaylist = document.getElementById('selected-playlist');
        const dropdownItems = document.querySelectorAll('.dropdown-item');
        
        dropdownBtn.addEventListener('click', () => {
            dropdownMenu.classList.toggle('hidden');
        });
        
        dropdownItems.forEach(item => {
            item.addEventListener('click', () => {
                const value = item.getAttribute('data-value');
                const text = item.textContent.trim();
                selectedPlaylist.textContent = value === 'all' ? 'All' : text;
                dropdownMenu.classList.add('hidden');
                filterChannels(value);
            });
        });
        
        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!dropdownBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                dropdownMenu.classList.add('hidden');
            }
        });
        
        // Filter channels function
        function filterChannels(playlist) {
            const channelCards = document.querySelectorAll('.channel-card');
            
            channelCards.forEach(card => {
                const playlistName = card.querySelector('p').textContent.toLowerCase();
                
                if (playlist === 'all' || playlistName === playlist.toLowerCase()) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }
        
        // Remove from favorites
        document.querySelectorAll('.remove-favorite').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const card = btn.closest('.channel-card');
                card.style.transform = 'translateX(100%)';
                card.style.opacity = '0';
                setTimeout(() => {
                    card.remove();
                    checkEmptyState();
                }, 300);
            });
        });
        
        // Check if favorites are empty
        function checkEmptyState() {
            const remainingCards = document.querySelectorAll('.channel-card');
            const emptyState = document.getElementById('empty-state');
            const favoritesGrid = document.getElementById('favorites-grid');
            
            if (remainingCards.length === 0) {
                favoritesGrid.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }
        }
        
        // Channel card click to play
        document.querySelectorAll('.channel-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (!e.target.closest('.remove-favorite')) {
                    const channelName = card.querySelector('h3').textContent;
                    console.log('Playing:', channelName);
                }
            });
        });
    </script>

</body>
</html>
